# Local Redis for BullMQ + Socket.io (async image generation).
# Usage: docker compose up -d redis
# Then set REDIS_URL=redis://localhost:6379 in packages/backend/.env

services:
  redis:
    image: redis:7-alpine
    container_name: nexus-hub-redis
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    volumes:
      - nexus-hub-redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  nexus-hub-redis-data:
